databases:
  - name: g-watch-db
    databaseName: g_watch
    user: g_watch
    plan: free

services:
  - type: web
    name: g-watch
    runtime: ruby
    plan: free
    buildCommand: ./bin/render-build.sh
    startCommand: bundle exec rails server
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: g-watch-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: 2
